on:
  # schedule:
  #   - cron: 0 0 * * *
  # push:
  workflow_dispatch:

jobs:
  job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install system packages
        run: |
          sudo env DEBIAN_FRONTEND=noninteractive apt-get -o Dpkg::Use-Pty=0 -o Dpkg::Progress-Fancy=0 -o APT::Color=0 -qq update
          sudo env DEBIAN_FRONTEND=noninteractive apt-get -o Dpkg::Use-Pty=0 -o Dpkg::Progress-Fancy=0 -o APT::Color=0 -yqq install --no-install-recommends ffmpeg fonts-noto-cjk
      - run: yarn add puppeteer
      - run: node reminder.mjs
        env:
          EMAIL: ${{ secrets.EMAIL }}
          PASSWORD: ${{ secrets.PASSWORD }}
          PROXY_SERVER: ${{ secrets.PROXY_SERVER }}
          TURNSTILE_SOLVER_PROVIDER: ${{ vars.TURNSTILE_SOLVER_PROVIDER }}
          TURNSTILE_SOLVER_API_KEY: ${{ secrets.TURNSTILE_SOLVER_API_KEY }}
          TWOCAPTCHA_API_KEY: ${{ secrets.TWOCAPTCHA_API_KEY }}
          CAPSOLVER_API_KEY: ${{ secrets.CAPSOLVER_API_KEY }}
          TURNSTILE_TIMEOUT_MS: ${{ vars.TURNSTILE_TIMEOUT_MS }}
          TURNSTILE_SOLVER_TIMEOUT_MS: ${{ vars.TURNSTILE_SOLVER_TIMEOUT_MS }}
      - uses: actions/upload-artifact@v6
        with:
          if-no-files-found: ignore
          path: |
            recording.webm
            debug-*.png
            debug-*.html
